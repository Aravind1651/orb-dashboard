services:
  - type: web
    name: orb-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: orb-data
      mountPath: /data
      sizeGB: 1
